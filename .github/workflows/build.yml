name: Build Module

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release type: "pre-release" or "tagged"'
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_SLOPPINESS: file_macro,time_macros,include_file_mtime,include_file_ctime

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-overwrite-existing: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}
          max-size: 200M

      - name: Remove version tags locally (pre-release only)
        if: inputs.release-type == 'pre-release'
        run: |
          # Remove any v* tags on HEAD so Gradle resolves tag as "ci"
          git tag --points-at HEAD | grep '^v' | xargs -r git tag -d || true

      - name: Build with Gradle
        env:
          GRADLE_OPTS: -Xmx4096m -XX:+UseParallelGC -Dfile.encoding=UTF-8
        run: |
          chmod +x ./gradlew
          ./gradlew :module:ciRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zygisk-module
          path: module/build/outputs/module/release

      - name: Remove ci tag locally
        run: git tag -d ci || true

      - name: Build changelog (pre-release)
        if: inputs.release-type == 'pre-release'
        uses: orhun/git-cliff-action@v4
        env:
          OUTPUT: module/release/changelog.md
        with:
          args: --unreleased --tag "CI Build"

      - name: Build changelog (tagged)
        if: inputs.release-type == 'tagged'
        uses: orhun/git-cliff-action@v4
        env:
          OUTPUT: module/release/changelog.md
        with:
          args: --latest

      - name: Update ci tag (pre-release only)
        if: inputs.release-type == 'pre-release'
        run: |
          git tag -f ci
          git push origin ci -f

      - name: Delete old pre-release (pre-release only)
        if: inputs.release-type == 'pre-release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete ci -y 2>/dev/null || true

      - name: Release (pre-release)
        if: inputs.release-type == 'pre-release'
        uses: softprops/action-gh-release@v2
        with:
          body_path: module/release/changelog.md
          prerelease: true
          name: CI Build
          tag_name: ci
          files: module/release/**

      - name: Release (tagged)
        if: inputs.release-type == 'tagged'
        uses: softprops/action-gh-release@v2
        with:
          body_path: module/release/changelog.md
          prerelease: false
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: module/release/**
